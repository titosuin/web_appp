{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto mt-10 animate-[fadein_0.3s_ease-out]">
    <div class="glass-panel p-8 md:p-12 rounded-2xl shadow-xl">
        <h2 class="text-3xl font-bold mb-2">Test de Fuerza Máxima</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-8">Ingresa tus máximos (1RM) para los principales levantamientos. Si no lo sabes, ingresa un aproximado o 0.</p>

        <form method="POST" action="/strength_test" class="space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Sentadilla (Squat RM - kg)</label>
                    <input type="number" step="0.5" name="sq_rm" value="{{ user.stats.sq_rm }}" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Press de Banca (Bench RM - kg)</label>
                    <input type="number" step="0.5" name="bp_rm" value="{{ user.stats.bp_rm }}" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Peso Muerto (Deadlift RM - kg)</label>
                    <input type="number" step="0.5" name="dl_rm" value="{{ user.stats.dl_rm }}" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                </div>
            </div>

            <button type="submit" class="w-full hover-scale mt-8 bg-gray-900 text-white dark:bg-white dark:text-gray-900 font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl text-lg">
                Calibrar Rango de Fuerza
            </button>
        </form>
    </div>
</div>
{% endblock %}
