{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto mt-10 animate-[fadein_0.3s_ease-out]">
    <div class="glass-panel p-8 md:p-12 rounded-2xl shadow-xl">
        <h2 class="text-3xl font-bold mb-2">Bienvenido a la Academia</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-8">Personalicemos tu experiencia. Esto calibrará los algoritmos para tu nutrición y entrenamiento.</p>

        <form method="POST" action="/onboarding" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Peso Corporal (kg)</label>
                    <input type="number" step="0.1" name="weight" placeholder="Ej: 75.5" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Estatura (cm)</label>
                    <input type="number" step="1" name="height" placeholder="Ej: 175" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Nivel de Actividad Diaria</label>
                    <select name="activity_level" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                        <option value="Sedentario">Sedentario (Trabajo de escritorio)</option>
                        <option value="Ligero" selected>Ligero (1-3 días de actividad suave)</option>
                        <option value="Moderado">Moderado (3-5 días ejercicio medio)</option>
                        <option value="Fuerte">Fuerte (Actividad atlética diaria)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Días Entrenamiento por Semana</label>
                    <select name="days_per_week" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                        <option value="2">2 Días</option>
                        <option value="3" selected>3 Días</option>
                        <option value="4">4 Días</option>
                        <option value="5">5+ Días</option>
                    </select>
                </div>
            </div>

            <div class="pt-2">
                <div>
                    <label class="block text-sm font-semibold mb-2">Tu Meta Principal</label>
                    <select name="goal" class="w-full px-4 py-3 bg-white/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-black transition" required>
                        <option value="Composición" selected>Recomposición Corporal (Estética y Salud)</option>
                        <option value="Volumen">Volumen (Subir peso de masa muscular)</option>
                        <option value="Déficit">Déficit (Reducir Grasa Corporal)</option>
                        <option value="Powerlifting">Powerlifting (Quiero maximizar mi fuerza al límite)</option>
                    </select>
                </div>
            </div> <!-- Note: Strength metrics were deferred to Strength Test route for UX -->

            <button type="submit" class="w-full hover-scale mt-8 bg-gray-900 text-white dark:bg-white dark:text-gray-900 font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl text-lg">
                Generar Perfil Antigravity
            </button>
        </form>
    </div>
</div>
{% endblock %}
